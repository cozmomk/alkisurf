<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Real-time paddleboard conditions for Alki Point, West Seattle — north & south side glass score" />
    <meta name="theme-color" content="#060d1f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Alki" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏄</text></svg>" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Alki Surf — Puget Sound Conditions</title>

    <!-- Google Analytics 4 ─────────────────────────────────────────────────
         Set VITE_GA_ID=G-XXXXXXXXXX in Railway → Variables before deploy.
         Vite replaces %VITE_GA_ID% at build time. If the var is absent the
         script still loads but gtag('config') points to an empty string and
         does nothing harmful. ─────────────────────────────────────────────-->
    <script async src="https://www.googletagmanager.com/gtag/js?id=%VITE_GA_ID%"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', '%VITE_GA_ID%', {
        // Don't send page_view on load — we fire it manually after hydration
        // so the score data is available as a custom dimension.
        send_page_view: false,
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
